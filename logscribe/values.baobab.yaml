## created by Bisonai

global:
  name: orakl-logscribe
  namespace: orakl
  image:
    repository: public.ecr.aws/bisonai/orakl-logscribe
    pullPolicy: IfNotPresent
    tag: "v0.0.1.20240906.0439.7b8f678"
    imagePullPolicy: IfNotPresent
    imagePullSecrets: []
  affinity:
    enabled: false
    key: kubernetes.io/hostname
    value:
  podAnnotations: {}
  livenessProbe:
    enabled: true
    path: /api/v1
    initialDelaySeconds: 10
    periodSeconds: 6
    timeoutSeconds: 6
    successThreshold: 1
    failureThreshold: 5
  readinessProbe:
    enabled: true
    path: /api/v1
    initialDelaySeconds: 10
    periodSeconds: 6
    timeoutSeconds: 2
    successThreshold: 1
    failureThreshold: 5
logscribe:
  enabled: true
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "orakl"
    vault.hashicorp.com/agent-requests-cpu: "50m"
    vault.hashicorp.com/agent-limits-cpu: ""
    vault.hashicorp.com/agent-requests-mem: "32Mi"
    vault.hashicorp.com/agent-limits-mem: "64Mi"
    vault.hashicorp.com/agent-inject-template-config: |
      {{ with secret "baobab/data/orakl-logscribe" -}}
        #!/bin/bash
        export DATABASE_URL="{{ .Data.data.DATABASE_URL }}"
      {{- end }}
  env:
    - name: USE_VAULT
      value: "true"
    - name: VAULT_ADDR
      value: http://172.0.100.165:8200/
    - name: JWT_PATH
      value: /var/run/secrets/kubernetes.io/serviceaccount/token
    - name: VAULT_ROLE
      value: orakl
    - name: VAULT_SECRET_PATH
      value: baobab
    - name: VAULT_KEY_NAME
      value: orakl-logscribe
    - name: LOG_LEVEL
      value: "debug"
    - name: CHAIN
      value: "baobab"

  replicas: 1
  podSecurityContext: {}
  containerSecurityContext: {}
  resources:
    limits:
      memory: 500Mi
    requests:
      cpu: 100m
      memory: 500Mi

nodeSelector: {}
tolerations: []
dotenv: {}
deployment:
  name: orakl-logscribe
  replicas: 1
