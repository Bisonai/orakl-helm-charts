## created by Bisonai

global:
  name: orakl-reporter
  namespace: orakl
  image:
    repository: public.ecr.aws/bisonai/orakl-reporter
    pullPolicy: IfNotPresent
    tag: "v0.0.1.20250519.0904.56967e4"
    imagePullPolicy: IfNotPresent
    imagePullSecrets: []
  affinity:
    enabled: false
    key: kubernetes.io/hostname
    value:
  podAnnotations: {}
  livenessProbe:
    enabled: true
    path: /api/v1
    initialDelaySeconds: 10
    periodSeconds: 6
    timeoutSeconds: 6
    successThreshold: 1
    failureThreshold: 5
  readinessProbe:
    enabled: true
    path: /api/v1
    initialDelaySeconds: 10
    periodSeconds: 6
    timeoutSeconds: 2
    successThreshold: 1
    failureThreshold: 5
reporter:
  annotations: {}
  replicas: 1
  podSecurityContext: {}
  containerSecurityContext: {}
  env:
    - name: USE_VAULT
      value: "true"
    - name: VAULT_ADDR
      value: http://172.0.100.165:8200/
    - name: JWT_PATH
      value: /var/run/secrets/kubernetes.io/serviceaccount/token
    - name: VAULT_ROLE
      value: orakl
    - name: VAULT_SECRET_PATH
      value: baobab
    - name: VAULT_KEY_NAME
      value: reporter
    - name: DAL_WS_URL
      value: "ws://dal.baobab.orakl.network/ws"
    - name: DAL_REST_URL
      value: "https://dal.baobab.orakl.network"
    - name: LOG_LEVEL
      value: "debug"
    - name: CHAIN
      value: "baobab"
    - name: SUBMISSION_PROXY_CONTRACT
      value: "0x05ce978f1200bc7243ae4a5968de8c3f8bd082f7"
    - name: KAIA_PROVIDER_URL
      value: http://172.0.100.240:8551
    - name: KAIA_WEBSOCKET_URL
      value: ws://172.0.100.230:8552
    - name: DELEGATOR_URL
      value: "http://orakl-delegator.orakl.svc.cluster.local"
    - name: GOMAXPROCS
      value: "1"
  resources:
    limits:
      memory: 500Mi
    requests:
      cpu: 300m
      memory: 100Mi
nodeSelector: {}
tolerations: []
dotenv: {}
deployment:
  name: orakl-reporter
  replicas: 1
