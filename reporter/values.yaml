## created by Bisonai

global:
  name: orakl-reporter
  namespace: orakl
  image:
    repository: public.ecr.aws/bisonai/orakl-reporter
    pullPolicy: IfNotPresent
    tag: ""
    imagePullPolicy: IfNotPresent
    imagePullSecrets: []
  affinity:
    enabled: false
    key: kubernetes.io/hostname
    value:
  podAnnotations: {}
  livenessProbe:
    enabled: true
    path: /api/v1
    initialDelaySeconds: 10
    periodSeconds: 6
    timeoutSeconds: 6
    successThreshold: 1
    failureThreshold: 5
  readinessProbe:
    enabled: true
    path: /api/v1
    initialDelaySeconds: 10
    periodSeconds: 6
    timeoutSeconds: 2
    successThreshold: 1
    failureThreshold: 5
reporter:
  enabled: true
  replicas: 1
  podSecurityContext: {}
  containerSecurityContext: {}
  resources:
    limits:
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 1Gi
nodeSelector: {}
tolerations: []
dotenv: {}
deployment:
  name: orakl-reporter
  replicas: 1
