global:
  name: orakl-reporter
  namespace: orakl
  image:
    repository: public.ecr.aws/bisonai/orakl-reporter
    pullPolicy: IfNotPresent
    tag: "v0.0.1.20240731.0607.67a5dd3"
    imagePullPolicy: IfNotPresent
    imagePullSecrets: []
  affinity:
    enabled: false
    key: kubernetes.io/hostname
    value:
  podAnnotations: {}
  livenessProbe:
    enabled: true
    path: /api/v1
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 5
  readinessProbe:
    enabled: true
    path: /api/v1
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 5
reporter:
  annotations: {}
  replicas: 1
  podSecurityContext: {}
  containerSecurityContext: {}
  resources:
    limits:
      cpu: 500m
      memory: 1Gi
    requests:
      cpu: 500m
      memory: 1Gi
  env:
    - name: USE_VAULT
      value: "true"
    - name: VAULT_ADDR
      value: http://172.0.100.185:8200/
    - name: JWT_PATH
      value: /var/run/secrets/kubernetes.io/serviceaccount/token
    - name: VAULT_ROLE
      value: orakl
    - name: VAULT_SECRET_PATH
      value: cypress
    - name: VAULT_KEY_NAME
      value: reporter
    - name: DAL_WS_URL
      value: "ws://orakl-dal.orakl.svc.cluster.local/ws"
    - name: LOG_LEVEL
      value: "info"
    - name: CHAIN
      value: "cypress"
    - name: SUBMISSION_PROXY_CONTRACT
      value: "0x07ec1e04353d0368ab9c6165dac2a0be51cfb1fe"
    - name: KAIA_PROVIDER_URL
      value: http://172.0.100.230:8551
    - name: KAIA_WEBSOCKET_URL
      value: ws://172.0.100.230:8552
    - name: DELEGATOR_URL
      value: "http://orakl-delegator.orakl.svc.cluster.local"
nodeSelector: {}
tolerations: []
dotenv: {}
deployment:
  name: orakl-reporter
  replicas: 1
