## Klaytn Orakl Api Configuration
## created by Bisonai
global:
  name: orakl-delegator
  namespace: orakl
  image:
    repository: public.ecr.aws/bisonai/orakl-delegator
    pullPolicy: IfNotPresent
    tag: "v0.0.1.20250519.0855.8e74afe"
    imagePullPolicy: IfNotPresent
    imagePullSecrets: []
  affinity:
    enabled: false
    key: kubernetes.io/hostname
    value:
  podAnnotations: {}
  livenessProbe:
    enabled: true
    path: /api/v1/
    initialDelaySeconds: 10
    periodSeconds: 6
    timeoutSeconds: 6
    successThreshold: 1
    failureThreshold: 5
  readinessProbe:
    enabled: true
    path: /api/v1/
    initialDelaySeconds: 10
    periodSeconds: 6
    timeoutSeconds: 6
    successThreshold: 1
    failureThreshold: 5
  secretManager:
    enabled: false
    secretId:
    versionId:

delegator:
  replicas: 1
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "orakl"
    vault.hashicorp.com/agent-requests-cpu: "50m"
    vault.hashicorp.com/agent-limits-cpu: ""
    vault.hashicorp.com/agent-requests-mem: "32Mi"
    vault.hashicorp.com/agent-limits-mem: "64Mi"
    vault.hashicorp.com/agent-inject-template-config: |
      {{ with secret "baobab/data/delegator" -}}
        #!/bin/bash
        export DATABASE_URL="{{ .Data.data.DATABASE_URL }}"
      {{- end }}
  podSecurityContext: {}
  containerSecurityContext: {}
  env:
    - name: USE_VAULT
      value: "true"
    - name: VAULT_ADDR
      value: http://172.0.100.165:8200/
    - name: JWT_PATH
      value: /var/run/secrets/kubernetes.io/serviceaccount/token
    - name: VAULT_ROLE
      value: orakl
    - name: VAULT_SECRET_PATH
      value: baobab
    - name: VAULT_KEY_NAME
      value: delegator
    - name: PROVIDER_URL
      value: http://172.0.100.240:8551
    - name: DATABASE_URL
      value:
    - name: GOMAXPROCS
      value: "1"
  resources:
    limits:
      memory: 500Mi
    requests:
      cpu: 100m
      memory: 100Mi
nodeSelector: {}
tolerations: []
dotenv: {}
deployment:
  name: orakl-delegator
  replicas: 1
