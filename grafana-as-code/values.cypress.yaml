global:
  name: orakl-grafana-as-code
  namespace: orakl

image:
  repository: asia-southeast1-docker.pkg.dev/vpc-host-orakl-prod/orakl/orakl-grafana
  pullPolicy: IfNotPresent
  tag: "monitor.v1.0.0.20260303.0216.7617595"
  imagePullSecrets:
    - name: gar-json-key

annotations:
  vault.hashicorp.com/agent-inject: "true"
  vault.hashicorp.com/agent-pre-populate-only: "true"
  vault.hashicorp.com/role: "orakl"
  vault.hashicorp.com/agent-requests-cpu: "50m"
  vault.hashicorp.com/agent-limits-cpu: ""
  vault.hashicorp.com/agent-limits-mem: "64Mi"
  vault.hashicorp.com/agent-requests-mem: "32Mi"
  vault.hashicorp.com/agent-inject-template-config: |
    {{ with secret "cypress/data/grafana-as-code" -}}
      #!/bin/bash
      export CYPRESS_DELEGATOR_DB_PW="{{ .Data.data.CYPRESS_DELEGATOR_DB_PW }}"
      export CYPRESS_MAIN_DB_PW="{{ .Data.data.CYPRESS_MAIN_DB_PW }}"
      export CYPRESS_MONITOR_DB_PW="{{ .Data.data.CYPRESS_MONITOR_DB_PW }}"
      export GRAFANA_PASSWORD="{{ .Data.data.GRAFANA_PASSWORD }}"
      export KF_CYPRESS_NODE_DB_PW="{{ .Data.data.KF_CYPRESS_NODE_DB_PW }}"
    {{- end }}

job:
  name: orakl-grafana-as-code
  env:
    - name: NETWORK
      value: "cypress"
    - name: GRAFANA_URL
      value: "http://prometheus-grafana.monitoring.svc"
    - name: GRAFANA_USER
      value: "admin"
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi
