## Kaia Orakl DAL Configuration
## created by Bisonai

global:
  name: orakl-dal
  namespace: orakl
  image:
    repository: public.ecr.aws/bisonai/orakl-dal #repository url
    pullPolicy: IfNotPresent
    tag: "v0.0.1.20240722.0657.d3a3573"
    imagePullPolicy: IfNotPresent
    # -- If defined, uses a Secret to pull an image from a private Docker registry or repository
    imagePullSecrets: []
  secretManager:
    enabled: false
    secretId:
    versionId:
  affinity:
    enabled: false
    key: kubernetes.io/hostname
    value:
  podAnnotations:
  livenessProbe:
    enabled: true
    path: ""
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 5
    successThreshold: 1
    failureThreshold: 5
  readinessProbe:
    enabled: true
    path: ""
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 1
    successThreshold: 1
    failureThreshold: 5
dal:
  service:
    type: ClusterIP
  enabled: true
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "orakl"
    vault.hashicorp.com/agent-inject-template-config: |
      {{ with secret "cypress/data/dal" -}}
        #!/bin/bash
        export DATABASE_URL="{{ .Data.data.DATABASE_URL }}"
      {{- end }}
  env:
    - name: USE_VAULT
      value: "true"
    - name: VAULT_ADDR
      value: http://172.0.100.185:8200/
    - name: JWT_PATH
      value: /var/run/secrets/kubernetes.io/serviceaccount/token
    - name: VAULT_ROLE
      value: orakl
    - name: VAULT_SECRET_PATH
      value: cypress
    - name: VAULT_KEY_NAME
      value: dal
    - name: DAL_API_PORT
      value: "8090"
    - name: KAIA_PROVIDER_URL
      value: "http://172.0.100.230:8551"
    - name: KAIA_WEBSOCKET_URL
      value: "ws://172.0.100.230:8552"
    - name: SUBMISSION_PROXY_CONTRACT
      value: "0xbfdb0c7f84b494272278cdad77de21634c395eda"
    - name: REDIS_HOST
      value: "redis-node-master.redis.svc.cluster.local"
    - name: REDIS_PORT
      value: "6379"
    - name: ORAKL_NODE_ADMIN_URL
      value: http://orakl-node.orakl.svc.cluster.local:3030/api/v1
  replicas: 1
  podSecurityContext: {}
  containerSecurityContext: {}
  resources:
    limits:
      cpu: 500m
      memory: 500Mi
    requests:
      cpu: 500m
      memory: 500Mi
nodeSelector: {}
tolerations: []
dotenv: {}
deployment:
  name: orakl-dal
  replicas: 1
