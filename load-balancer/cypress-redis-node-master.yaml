apiVersion: v1
kind: Service
metadata:
  name: redis-node-master-lb
  labels:
    app: prometheus
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
    - name: http-web
      protocol: TCP
      port: 6379
      targetPort: 6379
  selector:
    app.kubernetes.io/instance: redis-node
    app.kubernetes.io/name: redis