apiVersion: v1
kind: Service
metadata:
  name: prometheus-grafana-lb
  labels:
    app: prometheus
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  ports:
    - name: http-web
      protocol: TCP
      port: 80
      targetPort: 3000
  selector:
    app.kubernetes.io/instance: prometheus
    app.kubernetes.io/name: grafana