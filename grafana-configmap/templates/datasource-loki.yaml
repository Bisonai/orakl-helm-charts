{{- if .Values.datasources.loki.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource-loki
  namespace: {{ .Values.global.namespace }}
  labels:
    grafana_datasource: "1"
data:
  loki.yaml: |-
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        url: {{ .Values.datasources.loki.url }}
        access: proxy
        isDefault: false
        jsonData:
          maxLines: 1000
          timeout: 300
{{- end }}
