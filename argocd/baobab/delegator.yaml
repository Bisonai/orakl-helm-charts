apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: delegator
  namespace: argocd
  annotations:
    notifications.argoproj.io/subscribe.on-deployed: orakl-argocd-notification
    notifications.argoproj.io/subscribe.on-health-degraded: orakl-notification
    notifications.argoproj.io/subscribe.on-sync-failed: orakl-argocd-notification
    notifications.argoproj.io/subscribe.on-sync-running: orakl-notification
    notifications.argoproj.io/subscribe.on-sync-running.slack: orakl-argocd-notification
    notifications.argoproj.io/subscribe.on-sync-status-unknown.slack: orakl-argocd-notification
    notifications.argoproj.io/subscribe.on-sync-succeeded.slack: orakl-notification
spec:
  project: default
  source:
    repoURL: https://github.com/Bisonai/orakl-helm-charts.git
    targetRevision: idc-fly
    path: delegator
    helm:
      valueFiles:
      - values.baobab.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: orakl
  syncPolicy:
    automated: {}