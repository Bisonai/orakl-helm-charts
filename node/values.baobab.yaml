## Kaia Orakl Api Configuration
## created by Bisonai
global:
  name: orakl-node
  namespace: orakl
  image:
    repository: public.ecr.aws/bisonai/orakl-node
    pullPolicy: IfNotPresent
    tag: "v0.0.1.20250722.0446.860544b"
    imagePullPolicy: IfNotPresent
    # -- If defined, uses a Secret to pull an image from a private Docker registry or repository
    imagePullSecrets: []
  affinity:
    enabled: false
    key: kubernetes.io/hostname
    value:
  podAnnotations: {}
  livenessProbe:
    enabled: false
    path: /api/v1/
    initialDelaySeconds: 10
    periodSeconds: 6
    timeoutSeconds: 6
    successThreshold: 1
    failureThreshold: 5
  readinessProbe:
    enabled: false
    path: /api/v1/
    initialDelaySeconds: 10
    periodSeconds: 6
    timeoutSeconds: 6
    successThreshold: 1
    failureThreshold: 5
node:
  enabled: true
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "orakl"
    vault.hashicorp.com/agent-inject-template-config: |
      {{ with secret "baobab/data/orakl-node" -}}
        #!/bin/bash
        export DATABASE_URL="{{ .Data.data.DATABASE_URL }}"
      {{- end }}
  env:
    - name: USE_VAULT
      value: "true"
    - name: VAULT_ADDR
      value: http://172.0.100.165:8200/
    - name: JWT_PATH
      value: /var/run/secrets/kubernetes.io/serviceaccount/token
    - name: VAULT_ROLE
      value: orakl
    - name: VAULT_SECRET_PATH
      value: baobab
    - name: VAULT_KEY_NAME
      value: orakl-node
    - name: LOG_LEVEL
      value: "debug"
    - name: LOGSCRIBE_LOG_LEVEL
      value: "error"
    - name: APP_PORT
      value: "3030"
    - name: REDIS_HOST
      value: "redis-node-master.redis.svc.cluster.local"
    - name: REDIS_PORT
      value: "6379"
    - name: KAIA_PROVIDER_URL
      value: "http://172.0.100.240:8551"
    - name: ETH_PROVIDER_URL
      value: "http://34.142.228.64:4000"
    - name: ETH_WEBSOCKET_URL
      value: "wss://ethereum-rpc.publicnode.com"
    - name: SUBMISSION_PROXY_CONTRACT
      value: "0x05ce978f1200bc7243ae4a5968de8c3f8bd082f7"
    - name: DELEGATOR_URL
      value: "http://orakl-delegator.orakl.svc.cluster.local"
    - name: CHAIN
      value: "baobab"
    - name: BOOT_API_URL
      value: "http://100.94.226.85:5050"
    - name: HOST_IP
      value: "100.65.163.2"
    - name: WS_PROXY
      value: "ws://34.22.71.175:4000"

  replicas: 1
  podSecurityContext: {}
  containerSecurityContext: {}
  resources:
    limits:
      cpu: 6000m
      memory: 2Gi
    requests:
      cpu: 6000m
      memory: 2Gi
nodeSelector: {}
tolerations: []
dotenv: {}
deployment:
  name: orakl-node
  replicas: 1
