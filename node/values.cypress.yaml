## Kaia Orakl Api Configuration
## created by Bisonai
global:
  name: orakl-node
  namespace: orakl
  image:
    repository: public.ecr.aws/bisonai/orakl-node
    pullPolicy: IfNotPresent
    tag: "v0.0.1.20251224.0822.35b441a"
    imagePullPolicy: IfNotPresent
    # -- If defined, uses a Secret to pull an image from a private Docker registry or repository
    imagePullSecrets: []
  affinity:
    enabled: false
    key: kubernetes.io/hostname
    value:
  podAnnotations: {}
  livenessProbe:
    enabled: false
    path: /api/v1/
    initialDelaySeconds: 10
    periodSeconds: 6
    timeoutSeconds: 6
    successThreshold: 1
    failureThreshold: 5
  readinessProbe:
    enabled: false
    path: /api/v1/
    initialDelaySeconds: 10
    periodSeconds: 6
    timeoutSeconds: 6
    successThreshold: 1
    failureThreshold: 5
node:
  enabled: true
  annotations:
    vault.hashicorp.com/agent-inject: "true"
    vault.hashicorp.com/role: "orakl"
    vault.hashicorp.com/agent-requests-cpu: "50m"
    vault.hashicorp.com/agent-limits-cpu: "150m"
    vault.hashicorp.com/agent-requests-mem: "32Mi"
    vault.hashicorp.com/agent-limits-mem: "64Mi"
    vault.hashicorp.com/agent-inject-template-config: |
      {{ with secret "cypress/data/orakl-node" -}}
        #!/bin/bash
        export DATABASE_URL="{{ .Data.data.DATABASE_URL }}"
      {{- end }}
  env:
    - name: USE_VAULT
      value: "true"
    - name: VAULT_ADDR
      value: http://172.0.100.185:8200/
    - name: JWT_PATH
      value: /var/run/secrets/kubernetes.io/serviceaccount/token
    - name: VAULT_ROLE
      value: orakl
    - name: VAULT_SECRET_PATH
      value: cypress
    - name: VAULT_KEY_NAME
      value: orakl-node
    - name: LOG_LEVEL
      value: "error"
    - name: LOGSCRIBE_LOG_LEVEL
      value: "error"
    - name: APP_PORT
      value: "3030"
    - name: REDIS_HOST
      value: "redis-node-master.redis.svc.cluster.local"
    - name: REDIS_PORT
      value: "6379"
    - name: LISTEN_PORT
      value: "10010"
    - name: ETH_PROVIDER_URL
      value: "http://34.126.104.218:4000"
    - name: ETH_WEBSOCKET_URL
      value: "wss://ethereum-rpc.publicnode.com"
    - name: SUBMISSION_PROXY_CONTRACT
      value: "0xcb56b163e545a3870ca04c6ae2401f2405fb29a9"
    - name: DELEGATOR_URL
      value: "http://orakl-delegator.orakl.svc.cluster.local"
    - name: CHAIN
      value: "cypress"
    - name: BOOT_API_URL
      value: "http://100.72.39.118:5050"
    - name: HOST_IP
      value: "100.97.79.113"
    - name: WS_PROXY
      value: "ws://34.64.214.115:4000"
    - name: GOMAXPROCS
      value: "15"

  replicas: 1
  podSecurityContext: {}
  containerSecurityContext: {}
  resources:
    limits:
      memory: 4Gi
    requests:
      cpu: 6000m
      memory: 1Gi
tailscale:
  enabled: true
nodeSelector: {}
tolerations: []
dotenv: {}
deployment:
  name: orakl-node
  replicas: 1
